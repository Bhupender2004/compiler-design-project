<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- State circle 1 (left) -->
  <circle cx="22" cy="32" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- State circle 2 (right, double circle = accept state) -->
  <circle cx="46" cy="32" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="46" cy="32" r="7" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Arrow between states -->
  <line x1="32" y1="32" x2="35" y2="32" stroke="white" stroke-width="2"/>
  <polygon points="36,28 42,32 36,36" fill="white"/>
  <!-- Start arrow -->
  <line x1="4" y1="32" x2="10" y2="32" stroke="white" stroke-width="2"/>
  <polygon points="10,29 14,32 10,35" fill="white"/>
</svg>
